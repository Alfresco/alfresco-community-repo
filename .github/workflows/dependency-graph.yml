name: "Load Dependency Graph"

on:
  push:
    branches:
      - "master"
      - "release/25.N"
      - "release/23.N"
      - "release/7.4.N"
  schedule:
    - cron: '0 6 * * *'
  workflow_call:
  workflow_dispatch:

jobs:
  scan-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Alfresco/alfresco-build-tools/.github/actions/maven-dependency-scan@v18.7.1
        with:
          java-version: '21'
          maven-version: '3.9.9'
          maven-args: -Dscopes=compile,runtime
          maven-username: ${{ secrets.NEXUS_USERNAME }}
          maven-password: ${{ secrets.NEXUS_PASSWORD }}
          maven-settings-path: ".ci.settings.xml"
