name: Master/Release branch workflow

on:
  push:
    branches:
      - master
      - release/**

env:
  JAVA_VERSION: '21'
  GIT_USERNAME: ${{ secrets.BOT_GITHUB_USERNAME }}
  GIT_EMAIL: ${{ secrets.BOT_GITHUB_EMAIL }}
  GIT_PASSWORD: ${{ secrets.BOT_GITHUB_TOKEN }}
  DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
  MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
  QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
  QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
  GITHUB_ACTIONS_DEPLOY_TIMEOUT: 60

jobs:
  commit_parser:
    name: "Parse commit metadata"
    runs-on: ubuntu-latest
    outputs:
      title: ${{ steps.get-commit.outputs.COMMIT_MESSAGE }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-commit-message@v18.7.1
        id: get-commit
        with:
          header-only: "true"

  run_ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
  push_to_nexus:
    name: "Push to Nexus"
    runs-on: ubuntu-latest
    needs: [run_ci, commit_parser]
    if: >
      !(failure() || cancelled()) &&
      !contains(needs.commit_parser.outputs.title, '[no release]') &&
      github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v18.7.1
      - uses: Alfresco/alfresco-build-tools/.github/actions/free-hosted-runner-disk-space@v18.7.1
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v18.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: "Init"
        run: bash ./scripts/ci/init.sh
      - uses: Alfresco/alfresco-build-tools/.github/actions/configure-git-author@v18.7.1
        with:
          username: ${{ env.GIT_USERNAME }}
          email: ${{ env.GIT_EMAIL }}
          global: true
      - name: "Release"
        timeout-minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
        run: |
          bash scripts/ci/verify_release_tag.sh
          bash scripts/ci/maven_release.sh
      - name: "Clean Maven cache"
        run: bash ./scripts/ci/cleanup_cache.sh
  update_downstream:
    name: "Update alfresco-enterprise-repo"
    runs-on: ubuntu-latest
    needs: [push_to_nexus, commit_parser]
    if: >
      !(failure() || cancelled()) &&
      !contains(needs.commit_parser.outputs.title, '[no downstream]') &&
      github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v18.7.1
      - uses: Alfresco/alfresco-build-tools/.github/actions/free-hosted-runner-disk-space@v18.7.1
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v18.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: "Init"
        run: bash ./scripts/ci/init.sh
      - uses: Alfresco/alfresco-build-tools/.github/actions/configure-git-author@v18.7.1
        with:
          username: ${{ env.GIT_USERNAME }}
          email: ${{ env.GIT_EMAIL }}
          global: true
      - name: "Update downstream"
        run: bash ./scripts/ci/update_downstream.sh
        env:
          COMMIT_MESSAGE: ${{ needs.commit_parser.outputs.title }}
      - name: "Clean Maven cache"
        run: bash ./scripts/ci/cleanup_cache.sh
